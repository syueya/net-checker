<!doctype html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Net Checker</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="page">
    <header class="hero">
      <div>
        <p class="eyebrow">Docker Network Diagnostics</p>
        <h1>代理访问测试</h1>
      </div>
      <div class="hero-actions">
        <a class="button soft-action" href="/settings.html">设置</a>
        <button id="runBtn" class="primary">开始测试</button>
      </div>
    </header>

    <section class="panel result-panel home-result-panel">
      <div class="panel-title">
        <div>
          <h2>测试结果</h2>
        </div>
        <div class="title-meta">
          <span id="statusText" class="muted">配置加载中...</span>
          <button id="retryFailedBtn" class="retry-failed hidden">↻ 重试失败项</button>
        </div>
      </div>

      <div id="emptyResult" class="empty">点击“开始测试”。测试会使用设置页保存的代理和目标。</div>
      <div class="table-wrap result-wrap hidden" id="resultWrap">
        <table class="result-table">
          <thead>
            <tr>
              <th>目标</th>
              <th>结果</th>
              <th>状态码</th>
              <th>耗时</th>
              <th>失败原因</th>
            </tr>
          </thead>
          <tbody id="resultsBody"></tbody>
        </table>
      </div>
    </section>
  </div>

  <script src="/common.js"></script>
  <script src="/home.js"></script>
</body>
</html>
