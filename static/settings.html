<!doctype html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Net Checker Settings</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="page">
    <header class="hero">
      <div>
        <p class="eyebrow">Settings</p>
        <h1>测试配置</h1>
      </div>
      <div class="hero-actions">
        <a class="button soft-action" href="/">返回首页</a>
        <button id="saveBtn" class="primary">保存配置</button>
        <button id="resetBtn" class="danger-solid">重置默认</button>
      </div>
    </header>

    <main class="layout settings-layout">
      <div class="settings-stack">
        <section class="panel settings-panel">
        <div class="panel-title">
          <div>
            <h2>测试设置</h2>
            <p>代理在页面上开关，不需要重启容器。</p>
          </div>
          <span id="statusText" class="muted">配置加载中...</span>
        </div>

        <div class="form-grid">
          <label class="toggle-row">
            <input id="proxyEnabled" type="checkbox">
            <span>启用代理</span>
          </label>

          <label>
            <span>代理地址</span>
            <input id="proxyUrl" type="text" placeholder="http://host.docker.internal:7890">
          </label>

          <div class="form-row two-columns">
            <label>
              <span>请求超时（秒）</span>
              <input id="timeout" type="number" min="1" max="120" step="1">
            </label>

            <label>
              <span>自动刷新（秒，0 为关闭）</span>
              <input id="autoRefresh" type="number" min="0" max="3600" step="1">
            </label>
          </div>
        </div>
        </section>

        <section class="panel theme-panel">
          <div class="panel-title compact">
            <div>
              <h2>页面背景</h2>
              <p>切换黑色或白色显示风格。</p>
            </div>
          </div>
          <div class="theme-choice" role="group" aria-label="页面背景">
            <button class="theme-option" type="button" data-theme-choice="light">浅色</button>
            <button class="theme-option" type="button" data-theme-choice="dark">深色</button>
          </div>
        </section>
      </div>

      <section class="panel targets-panel">
        <div class="panel-title">
          <div>
            <h2>测试目标</h2>
            <p>填写你想测试代理访问情况的网页地址，保存后会写入配置文件。</p>
          </div>
          <button id="addTargetBtn" class="soft-action">添加目标</button>
        </div>

        <div class="table-wrap">
          <table class="target-table">
            <thead>
              <tr>
                <th>启用</th>
                <th>名称</th>
                <th>URL / 域名</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="targetsBody"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <template id="targetRowTemplate">
    <tr>
      <td><input class="target-enabled" type="checkbox"></td>
      <td><input class="target-name" type="text" placeholder="名称"></td>
      <td><input class="target-url" type="text" placeholder="https://example.com 或 example.com"></td>
      <td><button class="delete-row danger ghost" title="删除">删除</button></td>
    </tr>
  </template>

  <script src="/common.js"></script>
  <script src="/settings.js"></script>
</body>
</html>
